name: agentic-review

# Read-only agentic PR review.
# An auxiliary Go binary (cmd/agentic-review) reads the PR's diff,
# linked issue, and CI check-run summary, calls one of the supported
# LLM backends (GitHub Models OpenAI-compatible inference by default,
# or the Anthropic Messages API when ANTHROPIC_API_KEY is configured),
# and posts a sticky comment summarising the findings. The agent never
# pushes commits, never modifies labels, never bypasses the
# trust-boundary gate.
#
# Auth backends:
#   - GitHub Models (default for personal-account use): authed via
#     ${{ secrets.GITHUB_TOKEN }} when this workflow declares
#     `permissions: { models: read }`. Free tier; no separate secret.
#   - Anthropic direct: authed via ${{ secrets.ANTHROPIC_API_KEY }}.
#     Selected automatically when the secret is set, or pinned via
#     the AGENTIC_REVIEW_BACKEND repo variable.
# See docs/agentic-review.md §Auth backends for the full matrix.
#
# Operator opt-out: apply the `agentic-review:skip` label to a PR.
# Documentation: docs/agentic-review.md.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  # GitHub Models inference requires the workflow to declare this
  # permission so ${{ secrets.GITHUB_TOKEN }} carries the bearer scope
  # accepted by https://models.github.ai/inference/. Anthropic-direct
  # operators still see no extra cost or signal from this declaration.
  models: read

# Cancel an in-flight run on the same PR when a fresh push lands; the
# review only ever needs to reflect the latest HEAD.
concurrency:
  group: agentic-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: agentic-review
    runs-on: ubuntu-latest
    # Repo-level opt-in gate. The workflow is silent unless the operator
    # has set the `AGENTIC_REVIEW_ENABLED` repo variable to `'true'`
    # (Settings → Secrets and variables → Variables). This keeps a
    # freshly-instantiated template safe from running an empty-key
    # review and posting degraded comments before the operator has
    # decided whether to use the workflow.
    #
    # Per-PR opt-out: skip drafts, skip when the operator has applied
    # the `agentic-review:skip` label.
    if: >-
      vars.AGENTIC_REVIEW_ENABLED == 'true' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'agentic-review:skip')
    timeout-minutes: 10
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Build agentic-review binary
        run: go build -o /tmp/agentic-review ./cmd/agentic-review

      - name: Run review
        env:
          # Auth: the binary picks a backend based on which credentials
          # are present plus the optional AGENTIC_REVIEW_BACKEND repo
          # variable. GITHUB_TOKEN is always available; ANTHROPIC_API_KEY
          # may be empty, in which case GitHub Models is used.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENTIC_REVIEW_BACKEND: ${{ vars.AGENTIC_REVIEW_BACKEND }}
          # Override the default GitHub Models model identifier (default: openai/gpt-4.1).
          # See https://models.github.ai/catalog/models for the current catalog.
          AGENTIC_REVIEW_GITHUB_MODELS_MODEL: ${{ vars.AGENTIC_REVIEW_GITHUB_MODELS_MODEL }}
          AGENTIC_REVIEW_GITHUB_MODELS_ENDPOINT: ${{ vars.AGENTIC_REVIEW_GITHUB_MODELS_ENDPOINT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: /tmp/agentic-review
